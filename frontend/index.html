<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Buy Compare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    
    <!-- Header Section -->
    
    <div class="header">
        <div class="header-title">
            <h1 style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 5px; font-size: 36px;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#main-logo-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="main-logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#4c6ef5" />
                            <stop offset="100%" stop-color="#7048e8" />
                        </linearGradient>
                    </defs>
                    <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span style="background: linear-gradient(135deg, #4c6ef5, #7048e8); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: -1px;">Smart Buy Compare</span>
            </h1>
            <p>Compare prices. Decide smarter. Save more.</p>
        </div>

        <div style="display: flex; align-items: flex-start;">
            <button class="view-button theme-toggle-btn" style="margin-right: 15px; border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2em;" title="Toggle Theme">🌙</button>
            <div class="header-auth" id="authArea">
                <button id="authButton" class="auth-button" type="button">Login</button>
            </div>
        </div>
    </div>

    
    <!-- Category Buttons -->
    
    <div id="categories" class="categories">
        <button onclick="browseCategory('clothing', this)">Clothing</button>
        <button onclick="browseCategory('skincare', this)">Skincare</button>
        <button onclick="browseCategory('daily use', this)">Daily Use</button>
    </div>

    
    <!-- Search & Controls -->
  
    <div class="controls">

        <input 
            type="text" 
            id="searchInput" 
            placeholder="Search product..." 
        />

        <select id="prioritySelect">
            <option value="balanced">Balanced</option>
            <option value="fast">Fast Delivery</option>
            <option value="cheap">Cheapest</option>
        </select>

        <button onclick="searchProduct()">Search</button>

        <!-- View Toggle Buttons -->
        <button id="listBtn" class="view-button active-view"
                onclick="setViewMode('list', this)">List View</button>

        <button id="compareBtn" class="view-button"
                onclick="setViewMode('compare', this)">Compare View</button>

    </div>

    <!-- Loading Indicator -->
    <div id="loading" style="display:none; text-align:center; margin:20px;">
        <div id="loading" class="loader">
    <div class="spinner"></div>
        <p>Finding the best deals for you...</p>
    </div>
    </div>


    <!-- Results Section -->
    
    <div id="results"></div>

    <!-- Saved Products Section (only for logged-in users) -->
    <div id="savedProductsSection" class="saved-products-section" style="display:none;">
        <h2 class="saved-products-title">Saved Products</h2>
        <div id="savedProductsList" class="saved-products-list"></div>
        <p id="savedProductsEmpty" class="saved-products-empty">No saved products yet.</p>
    </div>

    <!-- Tracked Products Section (only for logged-in users) -->
    <div id="trackedProductsSection" class="saved-products-section" style="display:none; margin-top: 20px;">
        <h2 class="saved-products-title">Tracked Products</h2>
        <div id="trackedProductsList" class="saved-products-list"></div>
        <p id="trackedProductsEmpty" class="saved-products-empty">No tracked products yet.</p>
    </div>

    <!-- ================================
         Login Modal (session-based)
    ===================================-->
    <div id="authModalOverlay" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal">
            <button id="authModalCloseX" class="modal-close" type="button" aria-label="Close modal">×</button>

            <h2 id="authModalTitle">Login</h2>

            <div class="modal-field">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" />
            </div>

            <div class="modal-field">
                <label for="loginName">Name</label>
                <input id="loginName" type="text" placeholder="Your name" autocomplete="name" />
            </div>

            <div class="modal-actions">
                <button id="loginSubmit" class="modal-primary" type="button">Login</button>
                <button id="loginCloseBtn" class="modal-secondary" type="button">Close</button>
            </div>

            <div style="margin-top: 15px; text-align: center;">
                <p style="margin-bottom: 10px; color: #666; font-size: 0.9em;">OR</p>
                <button type="button" class="google-login-btn" onclick="window.location.href='/auth/google/login?next=' + encodeURIComponent(window.location.href)" style="width: 100%; padding: 10px; background: white; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #444;">
                    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google Logo" style="width:18px; height:18px; margin-right:8px; vertical-align:middle;">
                    Continue with Google
                </button>
            </div>

            <p id="authError" class="modal-error" role="alert" style="display:none;"></p>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
