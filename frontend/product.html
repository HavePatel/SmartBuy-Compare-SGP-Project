<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Smart Buy Compare</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark">
    <div class="container">
        <div class="header">
            <div class="header-title">
                <h1 style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 5px; font-size: 36px; cursor: pointer;" onclick="window.location.href='/'">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#main-logo-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <defs>
                            <linearGradient id="main-logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#4c6ef5" />
                                <stop offset="100%" stop-color="#7048e8" />
                            </linearGradient>
                        </defs>
                        <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span style="background: linear-gradient(135deg, #4c6ef5, #7048e8); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: -1px;">Smart Buy Compare</span>
                </h1>
                <p>Product Details</p>
            </div>

            <div style="display: flex; align-items: flex-start;">
                <button class="view-button theme-toggle-btn" style="margin-right: 15px; border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2em;" title="Toggle Theme">🌙</button>
                <div class="header-auth" id="authArea">
                    <button id="authButton" class="auth-button" type="button">Login</button>
                </div>
            </div>
        </div>

        <button class="back-link-btn" onclick="window.location.href='/'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Search
        </button>

        <div id="loadingIndicator" class="loading-spinner" style="display: block; text-align: center; margin-top: 100px;">
            <div class="spinner"></div>
            <p style="margin-top: 20px; color: var(--text-color);">Loading product details...</p>
        </div>

        <div id="errorIndicator" class="glass-panel" style="display: none; background: #ffe3e3; color: #c92a2a; border-left: 5px solid #e03131;">
            <h3>Product Not Found</h3>
            <p>The product you are looking for could not be loaded.</p>
        </div>

        <div id="productContent" style="display: none;" class="block-animation">
            <div class="product-grid" style="display: grid; grid-template-columns: 350px 1fr; gap: 30px;">
                
                <!-- Hero Column -->
                <aside class="glass-panel" style="padding: 30px; display: flex; flex-direction: column;">
                    <div style="width: 100%; height: 250px; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--border-color); background: var(--input-bg);">
                        <img id="pImage" src="" alt="" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; display: none;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                    </div>
                    <span id="pCategory" class="badge" style="align-self: flex-start; margin-bottom: 15px;"></span>
                    <h2 id="pName" class="glow-text" style="font-size: 2.2em; margin: 0 0 10px 0; line-height: 1.2;"></h2>
                    <p id="pBrand" class="muted-text" style="font-size: 1.2em; margin-bottom: 30px;"></p>

                    <div style="background: var(--input-bg); border-radius: 12px; padding: 20px; margin-bottom: 30px; text-align: center; border: 1px solid var(--border-color);">
                        <p class="muted-text" style="margin: 0 0 10px 0; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px;">Best Current Price</p>
                        <h1 id="pBestPrice" style="color: #40c057; font-size: 3em; margin: 0; text-shadow: 0 0 10px rgba(64, 192, 87, 0.3);"></h1>
                        <p id="pBestPlatform" style="margin: 10px 0 0 0; font-weight: bold;"></p>
                    </div>

                    <div id="actionContainer" style="display: flex; flex-direction: column; gap: 10px;">
                        <!-- Save and Track buttons injected here -->
                    </div>
                </aside>

                <!-- Data Column -->
                <section style="display: flex; flex-direction: column; gap: 30px;">
                    <!-- Chart Panel -->
                    <div class="glass-panel" style="padding: 20px;">
                        <h3 style="margin-top: 0;">Price History</h3>
                        <div style="height: 300px; width: 100%;"><canvas id="detailedPriceChart"></canvas></div>
                    </div>

                    <!-- Offers Panel -->
                    <div class="glass-panel" style="padding: 20px;">
                        <h3 style="margin-top: 0;">Compare All Offers</h3>
                        <p id="pInsight" style="color: #fbc02d; font-weight: 600; padding: 10px; background: rgba(251, 192, 45, 0.1); border-left: 4px solid #fbc02d; border-radius: 4px; margin-bottom: 20px;"></p>
                        
                        <div id="pOffersTable" style="overflow-x: auto;"></div>
                    </div>
                </section>
            </div>
        </div>
        </div>
    </div> <!-- Close page wrapper -->

    <!-- ================================
         Login Modal (session-based)
    ===================================-->
    <div id="authModalOverlay" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal">
            <button id="authModalCloseX" class="modal-close" type="button" aria-label="Close modal">×</button>
            <h2 id="authModalTitle">Login</h2>
            <div class="modal-field">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="modal-field">
                <label for="loginName">Name</label>
                <input id="loginName" type="text" placeholder="Your name" autocomplete="name" />
            </div>
            <div class="modal-actions">
                <button id="loginSubmit" class="modal-primary" type="button">Login</button>
                <button id="loginCloseBtn" class="modal-secondary" type="button">Close</button>
            </div>
            <div style="margin-top: 15px; text-align: center;">
                <p style="margin-bottom: 10px; color: #666; font-size: 0.9em;">OR</p>
                <button type="button" class="google-login-btn" onclick="window.location.href='/auth/google/login?next=' + encodeURIComponent(window.location.href)" style="width: 100%; padding: 10px; background: white; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #444;">
                    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google Logo" style="width:18px; height:18px; margin-right:8px; vertical-align:middle;">
                    Continue with Google
                </button>
            </div>
            <p id="authError" class="modal-error" role="alert" style="display:none;"></p>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="product.js"></script>
</body>
</html>
